version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: supportlens_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-supportlens_db}
      MYSQL_USER: ${MYSQL_USER:-supportlens_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-supportlens_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER:-supportlens_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-supportlens_pass}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-supportlens_db}
    volumes:
      - ./backend:/app
    depends_on:
      mysql:
        condition: service_healthy
    command: sh -c "sleep 5 && python seed_data.py && uvicorn main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  mysql_data:
